req_id: VIO-R-NUMBUF
category: VIO-R
title: "num_buffers is unconditional under modern virtio; equals 1 without MRG_RXBUF"
statement: >-
  When operating as a modern (VIRTIO_F_VERSION_1) device with
  VIRTIO_NET_F_MRG_RXBUF not negotiated, the dispatcher shall treat
  virtio_net_hdr.num_buffers as an always-present field and shall
  validate that its value equals 1.
verb_strength: shall
status: implemented
authority_class: authority_derived
notes: "Worked example for D069 source-authority discipline."
