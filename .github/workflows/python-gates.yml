name: Python Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  # Opt into Node.js 24 for actions still pinned at major versions
  # built on Node.js 20 (actions/checkout@v4, actions/setup-python@v5).
  # See the matching block in cd-matrix.yml for the deprecation
  # timeline reasoning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"


jobs:
  lint-and-typecheck:
    name: Lint + Type Check + Pylint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: flake8
        run: flake8 tooling/src/ tooling/tests/
      # Whole tree, not a hand-maintained dir list: a new package
      # (e.g. reqdb) must not be able to escape type/lint checks just
      # by not being listed here. flake8 above already covers all of
      # tooling/src + tooling/tests.
      - name: mypy
        run: mypy --strict tooling/src/
      - name: pylint
        run: pylint --rcfile=.pylintrc tooling/src/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest --cov=qemu_harness --cov=branch_cov --cov-branch --cov-report=term-missing -q
