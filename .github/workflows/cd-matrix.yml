name: CD matrix (arch × platform)

# Every commit to main (and every PR against main) builds AND boots
# three (arch, platform) cells from a clean checkout. Each cell:
#   1. installs the cross-toolchain
#   2. builds guest.{elf,bin} via make
#   3. installs the cell's VMM (qemu or firecracker)
#   4. invokes tooling/tracer_bullet/run_local.sh which launches the
#      guest under that VMM, captures serial to a temp file, and
#      checks for the READY marker — exit 0 = PASS, 1 = FAIL.
#
# aarch64/firecracker is build-only in CI: Firecracker requires KVM,
# and the free ubuntu-24.04-arm hosted runner does NOT expose
# /dev/kvm (empirical finding 2026-04-18, eaf50d3). run_local.sh
# detects this cell and exits 0 with an explicit SKIP message, so
# the uniform "call run_local.sh" step still works. VM-launch
# coverage for that cell lives in the local Pi-side tracer bullet
# (tooling/tracer_bullet/pi_aarch64_firecracker.sh). Promote the
# cell to full VM-launch when/if a future hosted arm64 image exposes
# KVM.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FIRECRACKER_VERSION: v1.15.1

jobs:
  pytest:
    # Arch-neutral Python test suite — tooling/tests/. Runs once,
    # not per matrix cell, because pytest itself doesn't care
    # about the target arch; the tests exercise host-side Python
    # code that drives the build/test infrastructure (ontology
    # module, branch-cov, CRC-32 pytest wrapper, derive-fold-
    # constants verifier, QEMU harness, CLI). Promotes a class
    # of regressions — test-breaking code slipping in via non-
    # Python commits or --no-verify — from "someone notices
    # eventually" to "CI blocks the push."
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package + dev extras
        run: pip install -e ".[dev]"
      - name: pytest
        run: pytest -q --no-header

  c-lint:
    # Four-layer static analysis on the host-side crypto test
    # drivers (tooling/crypto_tests/*.c): gcc + clang compile-as-
    # lint, clang-tidy, cppcheck, scan-build. Each catches a
    # different class of bug; combined runtime is seconds. Arch-
    # neutral — runs once per push, not per matrix cell. Landed
    # 2026-04-22 under the automation-cost-is-bounded discipline;
    # Makefile target lives at tooling/crypto_tests/lint.
    #
    # Runner pinned to ubuntu-24.04 deliberately, not
    # ubuntu-latest — clang-tidy's check set evolves across
    # Ubuntu LTS versions, and that drift would flip the gate
    # green / red independent of code changes. Bump deliberately.
    name: C lint (clang-tidy + cppcheck + scan-build + gcc/clang -Werror)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install C lint toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              gcc clang clang-tidy clang-tools cppcheck
      - name: Lint
        run: make -C tooling/crypto_tests lint

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64/qemu cell intentionally omitted from CI. QEMU's
          # -machine pc boots through SeaBIOS — ~1M+ lines of BIOS code
          # to hand off to our 142-byte Multiboot1 stub. The stub code
          # lives in arch/x86_64/platform/qemu/ for local use and
          # possible future qemu-microvm coverage, but running it in
          # hosted CI spends minutes exercising SeaBIOS, not our code.
          # x86_64/firecracker covers the BIOS-free PVH direct-boot
          # path; that's where our x86_64 CI signal lives.
          - arch: x86_64
            platform: firecracker
            runner: ubuntu-latest
            experimental: false
            trace: "0"
          - arch: aarch64
            platform: qemu
            runner: ubuntu-latest
            experimental: false
            # aarch64 stubs have 3 conditional branches; trace gives
            # real coverage signal. Boot-under-singlestep stays fast
            # on aarch64 (no BIOS path).
            trace: "1"
          - arch: aarch64
            platform: firecracker
            runner: ubuntu-24.04-arm
            experimental: false
            # firecracker has no -d exec equivalent; even if we
            # enabled TRACE, run_local.sh's aarch64/firecracker path
            # is a SKIP in CI (no KVM) so there's nothing to trace.
            trace: "0"
    name: build/${{ matrix.arch }}/${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-toolchain
        run: |
          sudo apt-get update
          # Assembler + linker per arch. x86_64 uses NASM per D048;
          # aarch64 stays on binutils' GAS + ld per D006.
          case "${{ matrix.arch }}" in
            x86_64)  sudo apt-get install -y nasm binutils-x86-64-linux-gnu ;;
            aarch64) sudo apt-get install -y binutils-aarch64-linux-gnu ;;
          esac
          # CRC-32 host C driver needs per-arch gcc + (when the test
          # arch differs from the runner arch) qemu-user-static.
          # aarch64/qemu runs on ubuntu-latest (x86_64 host), so its
          # crypto test needs the cross-gcc and qemu-user.
          if [ "${{ matrix.arch }}" = "aarch64" ] && \
             [ "${{ matrix.runner }}" = "ubuntu-latest" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu qemu-user-static
          fi

      - name: Build guest
        run: make -C arch/${{ matrix.arch }} PLATFORM=${{ matrix.platform }}

      - name: Verify artifact exists and has non-zero size
        run: |
          case "${{ matrix.arch }}" in
            x86_64)  ARTIFACT=arch/x86_64/build/${{ matrix.platform }}/guest.elf ;;
            aarch64) ARTIFACT=arch/aarch64/build/${{ matrix.platform }}/guest.bin ;;
          esac
          if [ ! -s "$ARTIFACT" ]; then
            echo "ERROR: $ARTIFACT missing or empty"
            exit 1
          fi
          ls -la "$ARTIFACT"
          file "$ARTIFACT"

      # Install whichever VMM this cell's platform uses, so run_local.sh
      # can drive it in the step after.
      - name: Install QEMU
        if: matrix.platform == 'qemu'
        run: |
          sudo apt-get install -y \
            qemu-system-x86 qemu-system-arm

      - name: Install Firecracker (prebuilt, SHA-verified)
        if: matrix.platform == 'firecracker'
        run: |
          VERSION="$FIRECRACKER_VERSION"
          FC_ARCH="${{ matrix.arch }}"
          BASE="https://github.com/firecracker-microvm/firecracker/releases/download/${VERSION}"
          TARBALL="firecracker-${VERSION}-${FC_ARCH}.tgz"
          CHECKSUM="${TARBALL}.sha256.txt"
          WORK=$(mktemp -d)
          trap 'rm -rf "$WORK"' EXIT
          curl -fLsS -o "$WORK/$TARBALL"  "$BASE/$TARBALL"
          curl -fLsS -o "$WORK/$CHECKSUM" "$BASE/$CHECKSUM"
          (cd "$WORK" && sha256sum -c "$CHECKSUM")
          # Tar-slip defense — refuse unsafe paths before extract.
          if tar -tzf "$WORK/$TARBALL" | grep -qE '^(/|.*\.\./)'; then
            echo "ERROR: tarball contains unsafe paths" >&2; exit 1
          fi
          tar --no-same-owner -xzf "$WORK/$TARBALL" -C "$WORK"
          FC_BIN="$WORK/release-${VERSION}-${FC_ARCH}/firecracker-${VERSION}-${FC_ARCH}"
          [ -x "$FC_BIN" ] || { echo "ERROR: firecracker binary missing"; exit 1; }
          sudo install -m 0755 "$FC_BIN" /usr/local/bin/firecracker
          firecracker --version

      - name: Probe and open /dev/kvm (firecracker cells only)
        if: matrix.platform == 'firecracker'
        run: |
          if [ -e /dev/kvm ]; then
            ls -la /dev/kvm
            # GHA's runner user isn't in the kvm group by default.
            # chmod 666 grants access for this job. Transient, CI-only,
            # runs inside a throwaway VM.
            sudo chmod 666 /dev/kvm
            ls -la /dev/kvm
            echo "::notice::KVM available on ${{ matrix.runner }} — firecracker boot viable"
          else
            echo "::warning::KVM NOT available on ${{ matrix.runner }} — firecracker boot would fail here"
          fi

      # tap0 backs the virtio-net device boot.S probes on x86_64/firecracker.
      # /dev/net/tun is built into the GHA ubuntu-latest kernel; modprobe is
      # a no-op there but keeps the step meaningful on self-hosted images
      # that ship tun as a loadable module. run_local.sh does the actual
      # `ip tuntap add` + teardown inside its trap — this step only ensures
      # the kernel capability is present before we try.
      - name: Ensure tun module available (x86_64/firecracker only)
        if: matrix.arch == 'x86_64' && matrix.platform == 'firecracker'
        run: |
          sudo modprobe tun || true
          if [ ! -c /dev/net/tun ]; then
            echo "::error::/dev/net/tun missing — virtio-net probe will fail"
            exit 1
          fi
          ls -la /dev/net/tun

      - name: Install tooling (for branch-cov when TRACE=1)
        if: matrix.trace == '1'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install branch_cov editable
        if: matrix.trace == '1'
        run: pip install -e ".[dev]"

      # Launch the built guest and check for the READY marker. For
      # aarch64/firecracker on a KVM-less host this step exits 0 with
      # a SKIP message (see run_local.sh's comment on that cell).
      # TRACE=1 (set per-cell via matrix.trace) additionally captures a
      # QEMU -d exec -singlestep trace and runs branch-cov — advisory.
      - name: Tracer bullet (launch + READY check + optional branch-cov)
        env:
          TRACE: ${{ matrix.trace }}
        run: ./tooling/tracer_bullet/run_local.sh ${{ matrix.arch }} ${{ matrix.platform }}

      # CRC-32 IEEE 802.3 vector tests. Runs the per-arch test driver
      # against IEEE 802.3 / zlib vectors; zero exit = all vectors
      # match the reference implementation. The matrix cell's arch
      # picks which Makefile target runs; the build tools are routed
      # per-runner so a native x86_64 runner uses its native gcc and
      # a native arm64 runner skips qemu-user entirely.
      - name: CRC-32 IEEE vector test
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            make -C tooling/crypto_tests test-x86_64 CC_X86=gcc
          elif [ "${{ matrix.runner }}" = "ubuntu-24.04-arm" ]; then
            make -C tooling/crypto_tests test-aarch64 \
                 CC_AARCH=gcc QEMU_AARCH64=
          else
            make -C tooling/crypto_tests test-aarch64
          fi

      # OSACA static pipeline analysis (D007). Advisory — the wrapper
      # always exits 0 whether OSACA succeeds, emits port-pressure
      # numbers with "X" for instructions missing from the uarch DB,
      # or crashes on an unmodelled opcode (current x86 I/O stubs).
      # Per D005, perf gates advise; functional gates block.
      - name: OSACA (advisory)
        if: always() && hashFiles('tooling/osaca/run.sh') != ''
        run: |
          # OSACA + its deps land in the same venv-equivalent that
          # run_local.sh expects. On GH-hosted runners where no venv
          # exists, pip-install directly into the runner's python.
          if [[ ! -x .venv/bin/osaca ]]; then
              python3 -m venv .venv
              .venv/bin/pip install -e "."
          fi
          ./tooling/osaca/run.sh ${{ matrix.arch }} ${{ matrix.platform }}

      # Explicit cleanup: remove build trees and any temp state that
      # might outlive the step. if:always() so this still fires when a
      # previous step failed. GitHub-hosted runners are ephemeral, but
      # this is also the contract for anyone copying the workflow onto
      # a self-hosted runner, where persistence WOULD leak.
      - name: Cleanup
        if: always()
        run: |
          echo "=== cleanup ==="
          rm -rf build/ arch/*/build/
          # run_local.sh's own mktemp -d is already handled by its trap,
          # but be explicit in case a future refactor changes that.
          find /tmp -maxdepth 1 -name 'fireasm-*' -user "$USER" \
              -exec rm -rf {} + 2>/dev/null || true
          find /tmp -maxdepth 1 -name 'tmp.*' -user "$USER" \
              -newer /etc/hostname -mmin -60 \
              -exec rm -rf {} + 2>/dev/null || true
          echo "cleanup done"
