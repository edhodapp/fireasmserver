name: CD matrix (arch × platform)

# Build-only MVP per D005. Every commit to main (and every PR against
# main) builds the four (arch, platform) cells from a clean checkout.
# Validates the cross-toolchain + Makefile + linker-script triad on
# fresh GitHub-hosted runners. VM-launch-level coverage in CI is
# follow-up work; today the per-cell guest-boot is exercised by the
# local pytest harness + the Pi-side tracer-bullet orchestration.
#
# Coverage scope: all cells are build-only today.
#
# x86_64 VM-launch coverage comes from the pytest harness in
# python-gates.yml (which runs on the same ubuntu-latest image that
# has /dev/kvm). AArch64/firecracker VM-launch coverage comes from
# the local Pi-side tracer bullet
# (tooling/tracer_bullet/pi_aarch64_firecracker.sh) — not from CI.
#
# Empirical finding (2026-04-18, eaf50d3): the free ubuntu-24.04-arm
# hosted runner does NOT expose /dev/kvm. The probe step at the bottom
# of each firecracker cell continues to surface this; promote the
# cell to VM-launch when/if a future hosted image makes KVM available.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: qemu
            runner: ubuntu-latest
            experimental: false
          - arch: x86_64
            platform: firecracker
            runner: ubuntu-latest
            experimental: false
          - arch: aarch64
            platform: qemu
            runner: ubuntu-latest
            experimental: false
          - arch: aarch64
            platform: firecracker
            runner: ubuntu-24.04-arm
            experimental: false
    name: build/${{ matrix.arch }}/${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-toolchain
        run: |
          sudo apt-get update
          case "${{ matrix.arch }}" in
            x86_64)  sudo apt-get install -y binutils-x86-64-linux-gnu ;;
            aarch64) sudo apt-get install -y binutils-aarch64-linux-gnu ;;
          esac

      - name: Build guest
        run: make -C arch/${{ matrix.arch }} PLATFORM=${{ matrix.platform }}

      - name: Verify artifact exists and has non-zero size
        run: |
          case "${{ matrix.arch }}" in
            x86_64)  ARTIFACT=arch/x86_64/build/${{ matrix.platform }}/guest.elf ;;
            aarch64) ARTIFACT=arch/aarch64/build/${{ matrix.platform }}/guest.bin ;;
          esac
          if [ ! -s "$ARTIFACT" ]; then
            echo "ERROR: $ARTIFACT missing or empty"
            exit 1
          fi
          ls -la "$ARTIFACT"
          file "$ARTIFACT"

      - name: Probe /dev/kvm (informational, firecracker cells only)
        if: matrix.platform == 'firecracker'
        run: |
          if [ -e /dev/kvm ]; then
            ls -la /dev/kvm
            echo "::notice::KVM available on ${{ matrix.runner }} — firecracker boot viable"
          else
            echo "::warning::KVM NOT available on ${{ matrix.runner }} — firecracker boot would fail here"
          fi
